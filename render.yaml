services:
  - type: web
    name: zamp-ap-resolution-demo
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: RUNTIME_DIR
        value: /var/data/zamp
      - key: PROVIDER_MODE
        value: live
      - key: MAPPING_PROVIDER
        value: openai
      - key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
        sync: false
      - key: AZURE_DOCUMENT_INTELLIGENCE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOW_DEMO_RESET
        value: "true"
    disk:
      name: zamp-runtime
      mountPath: /var/data
      sizeGB: 1
